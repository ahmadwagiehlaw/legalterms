<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدرب القانوني - لوحة تحكم المشرف</title>
    <link rel="icon" type="image/png" href="icon.png">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-4 sm:p-8">

    <!-- Edit User Modal -->
    <div id="edit-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/90 hidden backdrop-blur-sm transition-all">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-sm p-6 rounded-3xl text-right shadow-2xl">
            <h3 class="text-lg font-black text-amber-400 mb-4">تعديل بيانات المتدرب ✏️</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-slate-400 mb-1 text-xs">الاسم:</label>
                    <input type="text" id="edit-name" class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-3 py-2.5 focus:border-amber-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1 text-xs">اللقب:</label>
                    <select id="edit-title" class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-3 py-2.5 focus:border-amber-500 focus:outline-none transition">
                        <option value="دكتور">دكتور (باحث)</option>
                        <option value="دكتورة">دكتورة (باحثة)</option>
                    </select>
                </div>
                <div class="flex gap-2 mt-4 pt-2">
                    <button onclick="saveEditedUser()" class="flex-grow bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 rounded-xl text-sm transition">حفظ التعديلات</button>
                    <button onclick="closeEditModal()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-xl text-sm transition">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <header class="glass-panel p-6 rounded-3xl flex justify-between items-center shadow-xl">
            <div>
                <h1 class="text-2xl font-black text-amber-500">لوحة تحكم المشرف 👑</h1>
                <p class="text-sm text-slate-400 mt-1">تتبع نشاط المتدربين المباشر في تطبيق المدرب القانوني</p>
            </div>
            <div class="flex gap-4 text-center">
                <div class="bg-slate-900 px-4 py-2 rounded-xl border border-slate-800">
                    <p class="text-xs text-slate-400">المتدربين الكلي</p>
                    <p class="text-xl font-black text-slate-100" id="stat-total">0</p>
                </div>
                <div class="bg-slate-900 px-4 py-2 rounded-xl border border-emerald-900/50">
                    <p class="text-xs text-slate-400">متصل الآن 🟢</p>
                    <p class="text-xl font-black text-emerald-400" id="stat-online">0</p>
                </div>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="glass-panel p-4 rounded-3xl shadow-xl flex items-center gap-3">
            <span class="text-xl">🔍</span>
            <input type="text" id="search-input" oninput="renderTable()" placeholder="ابحث بالاسم أو رقم الهاتف..." class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-2 focus:border-amber-500 focus:outline-none transition font-bold text-sm">
        </div>

        <!-- Data Table -->
        <div class="glass-panel rounded-3xl overflow-hidden shadow-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-right">
                    <thead class="text-xs uppercase bg-slate-900/80 text-slate-400 border-b border-slate-800">
                        <tr>
                            <th class="px-6 py-4 font-bold rounded-tr-2xl">اسم المتدرب / الباحث</th>
                            <th class="px-6 py-4 font-bold">رقم الهاتف</th>
                            <th class="px-6 py-4 font-bold">الحالة</th>
                            <th class="px-6 py-4 font-bold text-center">النقاط 🏆</th>
                            <th class="px-6 py-4 font-bold text-center">التدريبات المنجزة 🎯</th>
                            <th class="px-6 py-4 font-bold">آخر ظهور</th>
                            <th class="px-6 py-4 font-bold text-center rounded-tl-2xl">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-slate-800/50">
                        <!-- Users will be injected here via JS -->
                        <tr>
                            <td colspan="7" class="px-6 py-10 text-center text-slate-500 font-bold">
                                جاري جلب البيانات من السحابة... ⏳
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyB8FpmdmHMmoZkCJqpefr7POHFInSHAmlk",
            authDomain: "legalterms-e66ad.firebaseapp.com",
            projectId: "legalterms-e66ad",
            storageBucket: "legalterms-e66ad.firebasestorage.app",
            messagingSenderId: "560103968057",
            appId: "1:560103968057:web:2a0696a84dc0d2768bace8"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Time formatter
        function timeAgo(date) {
            if (!date) return 'غير معروف';
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " سنة";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " شهر";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + " يوم";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + " ساعة";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + " دقيقة";
            return "الآن";
        }

        let allUsers = [];

        // Listen for real-time updates
        db.collection("users").onSnapshot((querySnapshot) => {
            allUsers = [];
            let onlineCount = 0;
            const now = new Date();

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                data.id = doc.id;
                
                data.isOnline = false;
                data.lastActiveText = "غير معروف";
                
                if (data.lastActive) {
                    const lastActiveDate = data.lastActive.toDate();
                    data.lastActiveText = timeAgo(lastActiveDate);
                    if ((now - lastActiveDate) / 1000 < 180) {
                        data.isOnline = true;
                        onlineCount++;
                    }
                }
                allUsers.push(data);
            });

            // Sort by score descending
            allUsers.sort((a, b) => (b.score || 0) - (a.score || 0));
            
            document.getElementById('stat-total').innerText = allUsers.length;
            document.getElementById('stat-online').innerText = onlineCount;

            renderTable();
        });

        function renderTable() {
            const tableBody = document.getElementById("users-table-body");
            tableBody.innerHTML = "";
            
            const searchQuery = document.getElementById("search-input") ? document.getElementById("search-input").value.trim().toLowerCase() : "";

            let displayedCount = 0;

            allUsers.forEach((data) => {
                const nameStr = data.name ? data.name.toLowerCase() : "";
                const phoneStr = data.id.toLowerCase();
                
                if (searchQuery && !nameStr.includes(searchQuery) && !phoneStr.includes(searchQuery)) {
                    return; // Skip this row
                }

                displayedCount++;
                const tr = document.createElement("tr");
                tr.className = "hover:bg-slate-900/50 transition duration-150";
                
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-amber-500 font-bold border border-slate-700">
                                ${(data.name || '?').charAt(0)}
                            </div>
                            <div>
                                <p class="font-bold text-slate-200">${data.title || ''} / ${data.name || 'مجهول'}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <span class="font-mono text-amber-400 font-bold" dir="ltr">${data.id}</span>
                    </td>
                    <td class="px-6 py-4">
                        ${data.isOnline 
                            ? '<span class="px-2.5 py-1 text-[10px] font-black rounded-full bg-emerald-950/80 text-emerald-400 border border-emerald-500/30">🟢 متصل الآن</span>' 
                            : '<span class="px-2.5 py-1 text-[10px] font-bold rounded-full bg-slate-900 text-slate-500 border border-slate-700">⚪ غير متصل</span>'}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="font-bold text-amber-400 text-lg">${data.score || 0}</span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="font-bold text-slate-300 text-lg">${data.completedExercises || 0}</span>
                    </td>
                    <td class="px-6 py-4 text-slate-400 text-xs">
                        ${data.lastActiveText}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex gap-2 justify-center">
                            <button onclick="openEditModal('${data.id}', '${data.name || ''}', '${data.title || ''}')" class="bg-blue-900/50 hover:bg-blue-800 text-blue-300 px-3 py-1.5 rounded-lg text-xs font-bold transition">تعديل</button>
                            <button onclick="deleteUser('${data.id}')" class="bg-red-900/50 hover:bg-red-800 text-red-300 px-3 py-1.5 rounded-lg text-xs font-bold transition">حذف</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });

            if (displayedCount === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="px-6 py-10 text-center text-slate-500 font-bold">لا يوجد نتائج تطابق بحثك.</td></tr>`;
            }
        }

        function deleteUser(id) {
            if (confirm("هل أنت متأكد من حذف هذا المتدرب نهائياً؟ لا يمكن التراجع عن هذا الإجراء.")) {
                db.collection("users").doc(id).delete().then(() => {
                    // UI auto-updates via onSnapshot
                }).catch((error) => {
                    console.error("Error removing user: ", error);
                    alert("فشل الحذف. تأكد من اتصالك بالإنترنت.");
                });
            }
        }

        let editingUserId = null;
        function openEditModal(id, name, title) {
            editingUserId = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-title').value = title;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            editingUserId = null;
            document.getElementById('edit-modal').classList.add('hidden');
        }

        function saveEditedUser() {
            if (!editingUserId) return;
            const newName = document.getElementById('edit-name').value.trim();
            const newTitle = document.getElementById('edit-title').value;
            
            if (!newName) {
                alert("الاسم لا يمكن أن يكون فارغاً");
                return;
            }

            db.collection("users").doc(editingUserId).update({
                name: newName,
                title: newTitle
            }).then(() => {
                closeEditModal();
            }).catch(e => {
                console.error(e);
                alert("فشل التحديث. تأكد من اتصالك بالإنترنت.");
            });
        }

    </script>
</body>
</html>
